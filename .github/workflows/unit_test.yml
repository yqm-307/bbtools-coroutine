# 工作流：每次 PR/提交 跑 ctest + 冒烟，合并到 main 跑 1h 并行压测

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── 每次提交：编译 + ctest + 冒烟 ──
  build-and-test:
    name: "编译 & 单元测试 & 冒烟"
    runs-on: ["self-hosted", "linux"]
    steps:
      - name: "拉取代码库"
        uses: actions/checkout@v4

      - name: "编译"
        run: pwd | xargs ./shell/workflow/unit_test/compile_code.sh

      - name: "ctest"
        run: cd build && ctest --output-on-failure

      - name: "冒烟测试"
        run: build/bin/unit_test/Test_smoke --log_level=test_suite

  # ── 仅 push main：1h 并行压测 ──
  stress-test:
    name: "1h 并行疲劳压测"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-and-test]
    runs-on: ["self-hosted", "linux"]
    timeout-minutes: 90
    steps:
      - name: "拉取代码库"
        uses: actions/checkout@v4

      - name: "编译"
        run: pwd | xargs ./shell/workflow/unit_test/compile_code.sh

      - name: "1h 并行压测"
        run: INTERVAL=60 bash scripts/run_parallel_stress.sh 3600 2
